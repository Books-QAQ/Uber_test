syntax = "proto3";

package uber.location.v1;

option go_package = "uber-test/backend/internal/gen/location/v1;locationpb";

message DriverLocationUpdate {
  string driver_id = 1;
  string order_id = 2;
  double lat = 3;
  double lng = 4;
  double speed_kph = 5;
  double heading = 6;
  double accuracy_m = 7;
  int64 reported_at_unix_ms = 8;
}

message DriverHeartbeat {
  string driver_id = 1;
  string order_id = 2;
  int64 reported_at_unix_ms = 3;
}

message DriverLocationBatch {
  repeated DriverLocationUpdate locations = 1;
}

message LocationIngressPacket {
  oneof payload {
    DriverLocationUpdate location_update = 1;
    DriverHeartbeat heartbeat = 2;
    DriverLocationBatch location_batch = 3;
  }
}
